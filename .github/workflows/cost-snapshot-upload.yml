name: Upload cost snapshot

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  upload:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GITHUB_EVENT_PATH: ${{ github.event_path }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Fetch, validate, and upload snapshot
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import stat
          import tempfile
          import urllib.error
          import urllib.parse
          import urllib.request

          AUDIENCE = "urn:mipsoft:cost-snapshots:staging"
          ENDPOINT = "https://mipsoft-ai-cost-manager-staging.blindsquare.workers.dev/v1/cost-snapshots"
          MAX_BYTES = 1_048_576
          MAX_OIDC_BYTES = 8_192
          SHA = re.compile(r"^[0-9a-f]{40}$")
          REPOSITORY = re.compile(r"^[A-Za-z0-9][A-Za-z0-9-]{0,38}/[A-Za-z0-9][A-Za-z0-9._-]{0,99}$")

          def fail(stage, status=None):
              suffix = f" status={status}" if status is not None else ""
              print(f"stage={stage} outcome=failure{suffix}")
              raise SystemExit(1)

          def pairs(pairs_list):
              result = {}
              for key, value in pairs_list:
                  if key in result:
                      raise ValueError("duplicate")
                  result[key] = value
              return result

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, request, file, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect)

          def read_bounded(response, limit):
              length = response.headers.get("Content-Length")
              if length is not None and (not length.isdigit() or int(length) > limit):
                  raise ValueError("response limit")
              body = response.read(limit + 1)
              if len(body) > limit:
                  raise ValueError("response limit")
              return body

          try:
              if os.environ.get("GITHUB_EVENT_NAME") != "pull_request":
                  fail("event")
              with open(os.environ["GITHUB_EVENT_PATH"], "rb") as event_file:
                  event = json.load(event_file, object_pairs_hook=pairs)
              pull = event["pull_request"]
              repository = event["repository"]["full_name"]
              number = pull["number"]
              base_ref = pull["base"]["ref"]
              head_ref = pull["head"]["ref"]
              head_sha = pull["head"]["sha"]
              if (not isinstance(repository, str) or not REPOSITORY.fullmatch(repository)
                      or not isinstance(number, int) or isinstance(number, bool) or number < 1
                      or not isinstance(base_ref, str) or not base_ref
                      or not isinstance(head_ref, str) or not head_ref
                      or not isinstance(head_sha, str) or not SHA.fullmatch(head_sha)):
                  fail("event")
              lifecycle = ("completed" if pull.get("merged") is True and pull.get("state") == "closed"
                           else "abandoned" if pull.get("merged") is not True and pull.get("state") == "closed"
                           else "provisional")
              path = f"prices/pr-{number:04d}.json"
              api_url = "https://api.github.com/repos/" + urllib.parse.quote(repository, safe="/") + "/contents/" + path + "?ref=" + head_sha
              token = os.environ.get("GITHUB_TOKEN")
              if not token:
                  fail("fetch")

              with tempfile.TemporaryDirectory(prefix="cost-snapshot-", dir="/tmp") as temp_dir:
                  os.chmod(temp_dir, stat.S_IRWXU)
                  snapshot_path = os.path.join(temp_dir, "snapshot.json")
                  request = urllib.request.Request(api_url, headers={
                      "Accept": "application/vnd.github.raw+json",
                      "Authorization": "Bearer " + token,
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "mipsoft-cost-snapshot-uploader",
                  })
                  try:
                      with opener.open(request, timeout=20) as response, open(snapshot_path, "xb") as output:
                          os.chmod(snapshot_path, stat.S_IRUSR | stat.S_IWUSR)
                          total = 0
                          while True:
                              chunk = response.read(65536)
                              if not chunk:
                                  break
                              total += len(chunk)
                              if total > MAX_BYTES:
                                  fail("fetch")
                              output.write(chunk)
                  except (urllib.error.HTTPError, urllib.error.URLError, OSError):
                      fail("fetch")

                  try:
                      with open(snapshot_path, "rb") as source:
                          snapshot = json.load(source, object_pairs_hook=pairs)
                  except (OSError, UnicodeDecodeError, ValueError):
                      fail("validate")
                  pull_snapshot = snapshot.get("pullRequest") if isinstance(snapshot, dict) else None
                  expected_url = f"https://github.com/{repository}/pull/{number}"
                  if (not isinstance(snapshot, dict) or snapshot.get("repository") != repository
                          or not isinstance(pull_snapshot, dict)
                          or pull_snapshot.get("number") != number
                          or pull_snapshot.get("url") != expected_url
                          or pull_snapshot.get("baseRef") != base_ref
                          or pull_snapshot.get("headRef") != head_ref
                           or not isinstance(pull_snapshot.get("headSHA"), str)
                           or not SHA.fullmatch(pull_snapshot.get("headSHA"))):
                      fail("validate")

                  wrapper_path = os.path.join(temp_dir, "envelope.json")
                  envelope = {"schemaVersion": 1, "sourceCommitSHA": head_sha, "lifecycle": lifecycle, "snapshot": snapshot}
                  try:
                      with open(wrapper_path, "x", encoding="utf-8") as output:
                          os.chmod(wrapper_path, stat.S_IRUSR | stat.S_IWUSR)
                          json.dump(envelope, output, separators=(",", ":"), ensure_ascii=False)
                  except (OSError, TypeError, ValueError):
                      fail("prepare")

                  oidc_url = os.environ.get("ACTIONS_ID_TOKEN_REQUEST_URL")
                  oidc_request_token = os.environ.get("ACTIONS_ID_TOKEN_REQUEST_TOKEN")
                  if not oidc_url or not oidc_request_token:
                      fail("oidc")
                  oidc_url += ("&" if "?" in oidc_url else "?") + urllib.parse.urlencode({"audience": AUDIENCE})
                  oidc_request = urllib.request.Request(oidc_url, headers={"Authorization": "Bearer " + oidc_request_token, "Accept": "application/json"})
                  try:
                      with opener.open(oidc_request, timeout=20) as response:
                          oidc = json.loads(read_bounded(response, MAX_OIDC_BYTES), object_pairs_hook=pairs)
                      oidc_token = oidc.get("value") if isinstance(oidc, dict) else None
                      if not isinstance(oidc_token, str) or not oidc_token:
                          fail("oidc")
                  except (urllib.error.HTTPError, urllib.error.URLError, OSError, UnicodeDecodeError, ValueError):
                      fail("oidc")

                  try:
                      with open(wrapper_path, "rb") as body:
                          upload_request = urllib.request.Request(ENDPOINT, data=body.read(), method="POST", headers={
                              "Accept": "application/json",
                              "Authorization": "Bearer " + oidc_token,
                              "Content-Type": "application/json",
                              "User-Agent": "mipsoft-cost-snapshot-uploader",
                           })
                          with opener.open(upload_request, timeout=20) as response:
                              if response.status != 202:
                                  fail("upload", response.status)
                              print("stage=upload outcome=success status=202")
                  except urllib.error.HTTPError as error:
                      fail("upload", error.code)
                  except (urllib.error.URLError, OSError):
                      fail("upload")
          except SystemExit:
              raise
          except Exception:
              fail("workflow")
          PY
